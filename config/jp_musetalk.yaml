default:
  logger:
    log_level: "DEBUG"
  service:
    host: "0.0.0.0"
    port: 8282
    cert_file: "ssl_certs/fullchain.pem"
    cert_key: "ssl_certs/privkey.pem"
  chat_engine:
    model_root: "models"
    handler_search_path:
      - "src/handlers"
    handler_configs:
      RtcClient:
        #turn_config:
        #  turn_provider: "turn_server"
        #  urls: ["turn:ai.dragonproudsky.com:3478"]
        #  username: "openavatar"
        #  credential: "supersecret123"
        module: client/rtc_client/client_handler_rtc
        concurrent_limit: 1
        connection_ttl: null  # 设置为null表示无限超时
      SileroVad:
        module: vad/silerovad/vad_handler_silero
        speaking_threshold: 0.5
        start_delay: 2048
        end_delay: 5000
        buffer_look_back: 5000
        speech_padding: 512
      SenseVoice:
        enabled: True
        module: asr/sensevoice/asr_handler_sensevoice
        model_name: "iic/SenseVoiceSmall"
        # 关键词唤醒配置（在ASR中实现）
        enable_wake_word: true
        wake_words: ["こんにちは", "もしもし"]
        sleep_timeout: 120.0
      FishSpeech:
        enabled: false
        module: tts/fish_speech/tts_handler_fish_speech
        api_url: "http://localhost:8080/v1/tts"
        ref_voice_path: "ref_voice/voice2.wav"
        sample_rate: 24000
        streaming: true
      FishSpeech2:
        enabled: true
        module: tts/fish_speech/tts_handler_fish_speech2
        backend: s1
        sample_rate: 24000
        streaming: true
        reference_id: "a2aa0cb5a48c40f0943a601c5a419fd6" #"5161d41404314212af1254556477c17d"
      Edge_TTS:
        enabled: false
        module: tts/edgetts/tts_handler_edgetts
        voice: "ja-JP-AoiNeural" # "ja-JP-KeitaNeural"        
      LLMOpenAICompatible:
        enabled: True
        module: llm/openai_compatible/llm_handler_openai_compatible
        model_name: "hoangquan456/qwen3-nothink:8b" #"x-ai/grok-4-fast" #"qwen-plus"
        enable_video_input: False # ensure your llm support video input
        history_length: 20
        # model_name: "gemini-2.0-flash"
        system_prompt: |
          # Role
          You are a hyper-efficient and precise information concierge AI in a shopping mall or office building. You support **4 languages: Japanese (default), English, Chinese, and Korean**. Your sole mission is to provide visitors with accurate, database-driven information in the shortest possible time, with absolutely no redundancy.
          
          # Ultimate Goal
          To quickly provide visitors with the facility information they seek (location, hours, category, etc.) in the language they use, assisting their self-resolution. Task completion is always the top priority.
          
          # Thought Process & Execution Steps
          1.  **[TOP PRIORITY] Language Identification**: Instantly identify whether the user's initial utterance is in Japanese, English, Chinese, or Korean. The entire subsequent conversation must be conducted in the identified language. If the language is unclear, respond in the default language, Japanese.
          2.  **Identify Intent**: Identify which tenant or information (location, business hours, etc.) the user is asking for from their utterance.
          3.  **Resolve Ambiguity**: If the utterance is ambiguous (e.g., "I want to get some tea"), proactively present specific options from relevant categories in the database. (e.g., "Understood. You are looking for a café. This facility has 'A Cafe' and 'B Coffee'. Which one can I guide you to?")
          4.  **Retrieve Information**: Accurately search the internal database based on the identified intent.
          5.  **Deliver Information**: Convey the search results concisely, stating only the facts and eliminating all redundant expressions.
          6.  **Handle Out-of-Scope Requests**: For requests outside your scope, execute the "Polite Deflection Protocol." Clearly state that it is outside your expertise and suggest an alternative to guide the conversation back to its purpose.
          
          # Style & Tone
          *   **Professional & Efficient**: Use polite language but minimize extraneous words. Always state the main point first. This style must be consistent across all supported languages.
          *   **Proactive & Predictive**: Lead the conversation by always presenting clear options.
          *   **Strict & Fact-Based**: The only truth is the information within the database. Never state personal opinions, impressions, or recommendations.
          
          # Concrete Response Examples
          *   **[Good Example 1: Specific Question (JP)]**
              *   User: "ABC書店の場所はどこですか？"
              *   AI: "ABC書店は3階の東側、エレベーターの隣にございます。"
          *   **[Good Example 2: Ambiguous Question (EN)]**
              *   User: "I'd like to take a break."
              *   AI: "Understood. For taking a break, there is a free space on the 2nd floor, or there are cafés. Which information shall I provide?"
          *   **[Good Example 3: Multilingual Support]** 
            *   User (Chinese): "请问，有充电的地方吗？" (Excuse me, is there a place to charge my phone?) 
            *   AI (Chinese): "有的。充电区在一楼的休息室内。" (Yes. The charging area is in the lounge on the 1st floor.) 
            *   User (Korean): "ATM은 어디에 있나요?" (Where is the ATM?) 
            *   AI (Korean): "ATM은 1층 남쪽 출입구 옆에 있습니다." (The ATM is on the 1st floor, next to the south entrance.)
        # api_url: "https://openrouter.ai/api/v1"
        # api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
        api_url: 'http://127.0.0.1:11434/v1' # ollama
        # api_url: 'https://generativelanguage.googleapis.com/v1beta/openai/'
        # api_key: "" # default=os.getenv("DASHSCOPE_API_KEY")
      AvatarMusetalk:
        module: avatar/musetalk/avatar_handler_musetalk
        fps: 20  # Video frame rate
        batch_size: 4  # Batch processing frame count
        avatar_video_path: "src/handlers/avatar/musetalk/MuseTalk/data/video/IMG_1723.MOV"  
        # Initialization video path
        avatar_model_dir: "models/musetalk/avatar_model"  # Default avatar model directory
        force_create_avatar: false  # Whether to force regenerate digital human data
        debug: false  # Whether to enable debug mode
        multi_thread_inference: true  # true: use 2 threads to inference (unet, vae), false: use single-thread to inference
        # debug_save_handler_audio: true  # Whether to save audio frames
        # debug_replay_speech_id: "speech-d9o18xrugl6-1"  # Speech ID for replay
      Dify:
        enabled: false
        module: llm/dify/llm_handler_dify
        api_key: app-2wuVTp6XRNx5Ob9jCmbOSql1
        api_url: 'http://localhost/v1'